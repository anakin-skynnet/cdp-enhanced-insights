# Bank Payment Platform CDP / Customer 360 - Databricks Asset Bundle
# Azure Databricks deployment for dev and prod

bundle:
  name: bank-payment-platform-cdp

include:
  - resources/pipelines.yml
  - resources/jobs.yml
  - resources/dashboards.yml
  - resources/cdp_customer_360_app.app.yml
  - resources/genie_spaces.yml
  # resources/alerts.yml - SQL alerts: create manually in workspace; schema may vary by CLI version

variables:
  catalog:
    default: "ahs_demos_catalog"
  schema:
    default: "cdp_360"
  warehouse_id:
    default: "c60fc6392746d138"
  schema_location_base:
    default: "/Volumes/ahs_demos_catalog/cdp_360/cdp_metadata/schemas"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT

  prod:
    mode: production
    workspace:
      profile: DEFAULT
