# Bank Payment Platform CDP - Databricks App (DABs managed)
# Customer 360 full-stack application

resources:
  apps:
    cdp_customer_360_app:
      name: bpp-cdp-360
      description: "Bank Payment Platform Customer 360 — Enhanced Customer Intelligence Platform. 14+ analytics pages, AI chat (Supervisor Agent + Genie), Lakebase operational store, campaign management, NBA assignments, anomaly triage, and full merchant 360 view."
      source_code_path: ../src/app
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: serving-endpoint
          serving_endpoint:
            name: agents_ahs_demos_catalog-cdp_360-cdp_supervisor_agent
            permission: CAN_QUERY
        - name: genie-space
          genie_space:
            name: "Merchant 360 Analytics"
            space_id: 01f12432dc001e7d927a3ce0f42926ad
            permission: CAN_RUN
        - name: lakebase
          database:
            name: cdp-360-ops
      permissions:
        - level: CAN_USE
          group_name: "users"
