# PagoNxt Getnet CDP - Jobs for Data Generation, ML, Identity Resolution, and AI Agents
# Execution order: 00 (data gen), pipelines 01-02, job 03 (identity resolution), pipeline 04 (gold), then jobs 05-15
# All jobs use serverless compute for faster startup and no cluster management.

resources:
  jobs:
    generate_source_data:
      name: "[${bundle.target}] 00 CDP Generate Synthetic Source Data"
      description: "Generates realistic synthetic data for all 5 source systems (Salesforce, Zendesk, Getnet, Genesys) into Unity Catalog Volumes"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/data_generation/generate_source_data.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              num_merchants: "150"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    identity_resolution:
      name: "[${bundle.target}] 03 CDP Identity Resolution"
      description: "Customer Entity Resolution - produces gold_customer_360 golden record and operational tables"
      tasks:
        - task_key: create_operational_tables
          sql_task:
            file:
              path: ../src/cdp_etl/setup/create_operational_tables.sql
            warehouse_id: ${var.warehouse_id}
        - task_key: identity_resolution
          depends_on:
            - task_key: create_operational_tables
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/identity_resolution/identity_resolution.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    segmentation_refresh:
      name: "[${bundle.target}] 05 CDP Segmentation Refresh"
      description: "Refresh merchant segments (RFM, clustering) via SQL warehouse"
      tasks:
        - task_key: segmentation
          sql_task:
            file:
              path: ../src/cdp_etl/setup/refresh_segmentation.sql
            warehouse_id: ${var.warehouse_id}
      schedule:
        quartz_cron_expression: "0 0 3 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    call_center_nlp:
      name: "[${bundle.target}] 06 CDP Call Center NLP Enrichment"
      description: "Speech-to-text and sentiment analysis on call center interactions using Foundation Model API"
      tasks:
        - task_key: call_center_nlp
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/call_center_analytics/call_center_nlp.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 30 3 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    churn_model_training:
      name: "[${bundle.target}] 07 CDP Churn Model Training"
      description: "Train and register merchant churn prediction model"
      tasks:
        - task_key: churn_training
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/churn_model/churn_training.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 4 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    clv_training:
      name: "[${bundle.target}] 08 CDP Customer Lifetime Value"
      description: "Train BG/NBD + Gamma-Gamma CLV models (Databricks Solution Accelerator)"
      tasks:
        - task_key: clv_training
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/clv/clv_training.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 5 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    multi_touch_attribution:
      name: "[${bundle.target}] 09 CDP Multi-Touch Attribution"
      description: "Markov Chain channel attribution (Databricks Solution Accelerator)"
      tasks:
        - task_key: attribution
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/attribution/multi_touch_attribution.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    propensity_scoring:
      name: "[${bundle.target}] 10 CDP Hyper-Personalization Propensity"
      description: "Train churn/upsell/activation propensity models for hyper-personalization"
      tasks:
        - task_key: propensity
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/hyper_personalization/propensity_scoring.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 30 6 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    behavioral_segmentation:
      name: "[${bundle.target}] 11 CDP Behavioral Segmentation"
      description: "K-Means behavioral clustering (Databricks Solution Accelerator)"
      tasks:
        - task_key: clustering
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/advanced_segmentation/behavioral_clustering.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 5 30 * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    campaign_roi_analysis:
      name: "[${bundle.target}] 12 CDP Campaign ROI Analysis"
      description: "Analyze campaign conversion, revenue lift, and reactivation metrics"
      tasks:
        - task_key: campaign_roi
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/campaign_analysis/campaign_roi_analysis.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    ad_creative_generation:
      name: "[${bundle.target}] 13 CDP AI Ad Creative Generation"
      description: "Generate personalized marketing content per segment using Foundation Model API"
      tasks:
        - task_key: ad_creative
          notebook_task:
            notebook_path: ../src/cdp_etl/notebooks/ad_creative/ad_creative_generation.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
      schedule:
        quartz_cron_expression: "0 30 7 1,15 * ?"
        timezone_id: "America/Buenos_Aires"
      permissions:
        - level: CAN_VIEW
          group_name: "users"

    deploy_agents:
      name: "[${bundle.target}] 14 CDP Deploy AI Agents"
      description: "Log and deploy CDP Supervisor + 3 specialist agents to Model Serving"
      tasks:
        - task_key: setup_uc_functions
          sql_task:
            file:
              path: ../src/agents/uc_functions/setup_uc_functions.sql
            warehouse_id: ${var.warehouse_id}
        - task_key: deploy_agents
          depends_on:
            - task_key: setup_uc_functions
          notebook_task:
            notebook_path: ../src/agents/deploy_agents.py
      permissions:
        - level: CAN_VIEW
          group_name: "users"
