command:
  - "uvicorn"
  - "app.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8080"

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse

  - name: CDP_CATALOG
    value: "ahs_demos_catalog"

  - name: CDP_SCHEMA
    value: "cdp_360"

  - name: CDP_DATA_SOURCE
    value: "mock"

  - name: CDP_AGENT_ENDPOINT
    value: "ahs_demos_catalog-cdp_360-cdp_supervisor_agent"

  - name: CDP_GENIE_SPACE_ID
    value: ""
